name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        env:
          GITHUB_PAGES: "true"
          NEXT_PUBLIC_SITE_URL: "https://viet20016602.github.io/SolComp"
        run: npm run build

      - name: Archive site export
        shell: pwsh
        run: Compress-Archive -Path out\* -DestinationPath syns-site-export.zip

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: syns-site-export.zip
